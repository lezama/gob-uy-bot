name: Auto-merge Copilot PRs (con guardrails)

# Mergea automáticamente PRs que cumplen TODOS estos criterios:
#  - Autor: copilot bot
#  - Label: auto-merge-candidate
#  - Solo modifica archivos bajo: _posts/ , data/state.json , _data/
#  - <= 800 líneas modificadas en total
#  - Frontmatter del .md modificado parsea como YAML válido (best-effort)
#
# Si NO cumple, agrega label needs-review y comenta lo que faltó.

on:
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    if: |
      contains(fromJson('["app/copilot-swe-agent","Copilot","github-actions[bot]","copilot-pull-request-reviewer[bot]"]'), github.event.pull_request.user.login)
      || contains(github.event.pull_request.labels.*.name, 'auto-merge-candidate')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Gather PR diff stats
        id: stats
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Lista de archivos modificados
          FILES=$(gh pr view "$PR" --repo "$REPO" --json files --jq '.files[].path')
          echo "$FILES" > /tmp/files.txt

          # Total lines changed (additions + deletions)
          TOTAL=$(gh pr view "$PR" --repo "$REPO" --json additions,deletions --jq '.additions + .deletions')

          # Check labels
          LABELS=$(gh pr view "$PR" --repo "$REPO" --json labels --jq '.labels[].name')
          echo "$LABELS" > /tmp/labels.txt

          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

      - name: Evaluate guardrails
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          TOTAL: ${{ steps.stats.outputs.total }}
        run: |
          REASONS=()
          PASS=true

          # 0. PR debe tener AL MENOS un archivo modificado en _posts/*.md.
          # Sin esto, un PR vacío (solo commit "Initial plan" del Copilot agent)
          # pasa todos los guardrails default-true y mergea sin contenido.
          # Validado empíricamente con PR #23 y PR #27 (ambos mergearon vacíos).
          #
          # IMPORTANTE: usar `grep -q` con if/then, NO `grep -c | echo 0`.
          # Cuando grep retorna exit 1 (sin matches), `|| echo 0` concatena
          # outputs y POST_COUNT termina como "0\n0", que rompe `[ -lt 1 ]`
          # con "integer expression expected" y la condición se evalúa false
          # (porque el test falla, no porque sea false).
          if ! grep -q '^_posts/.*\.md$' /tmp/files.txt 2>/dev/null; then
            PASS=false
            REASONS+=("PR no tiene archivos en _posts/*.md (probable PR vacío del agent inicializando)")
          fi

          # 1a. Reject explícito de paths sensibles (defense in depth — el
          # default-deny de 1b también los rechaza, pero el mensaje específico
          # ayuda al agent a entender qué hizo mal).
          DANGER_PATHS=(
            ".github/"
            "data/prompts/"
            "data/sources.yml"
            "_config.yml"
            "Gemfile"
            "_layouts/"
            "_includes/"
            "assets/"
            "CONTRIBUTING.md"
            "LICENSE"
            "README.md"
          )
          while IFS= read -r f; do
            if [ -z "$f" ]; then continue; fi
            for danger in "${DANGER_PATHS[@]}"; do
              if [[ "$f" == ${danger}* || "$f" == "$danger" ]]; then
                PASS=false
                REASONS+=("ruta sensible (requiere review humano): $f")
              fi
            done
          done < /tmp/files.txt

          # 1b. Allowlist estricta — todo lo que no esté acá explícitamente
          # se rechaza, aunque no esté en la danger list.
          while IFS= read -r f; do
            if [ -z "$f" ]; then continue; fi
            case "$f" in
              _posts/*) ;;
              data/state.json) ;;
              _data/*) ;;
              *)
                PASS=false
                REASONS+=("modifies disallowed path: $f")
                ;;
            esac
          done < /tmp/files.txt

          # 2. Total lines
          if [ "$TOTAL" -gt 800 ]; then
            PASS=false
            REASONS+=("excede 800 líneas modificadas (actual: $TOTAL)")
          fi

          # 3. Required label
          if ! grep -q '^auto-merge-candidate$' /tmp/labels.txt; then
            PASS=false
            REASONS+=("falta label 'auto-merge-candidate'")
          fi

          # 4. YAML frontmatter validation (best effort) for any .md in _posts/
          for f in $(grep '^_posts/.*\.md$' /tmp/files.txt 2>/dev/null || true); do
            if [ -f "$f" ]; then
              # Extract frontmatter between --- markers
              awk '/^---$/{c++; next} c==1' "$f" > /tmp/fm.yml
              if ! python3 -c "import yaml,sys; yaml.safe_load(open('/tmp/fm.yml'))" 2>/dev/null; then
                PASS=false
                REASONS+=("frontmatter inválido en $f")
              fi
            fi
          done

          # 5. Bloqueo si hay reviews humanas pendientes con CHANGES_REQUESTED
          REQUESTED_CHANGES=$(gh pr view "$PR" --repo "$REPO" --json reviews --jq '[.reviews[] | select(.state=="CHANGES_REQUESTED")] | length')
          if [ "$REQUESTED_CHANGES" -gt 0 ]; then
            PASS=false
            REASONS+=("hay $REQUESTED_CHANGES review(s) humana(s) con CHANGES_REQUESTED — no bypassear")
          fi

          if [ "$PASS" = "true" ]; then
            echo "pass=true" >> "$GITHUB_OUTPUT"
            echo "✅ All guardrails passed"
          else
            echo "pass=false" >> "$GITHUB_OUTPUT"
            { echo "reasons<<EOF"; printf '  - %s\n' "${REASONS[@]}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
            echo "❌ Failed guardrails:"
            printf '  - %s\n' "${REASONS[@]}"
          fi

      - name: Auto-merge (if passed)
        if: steps.gate.outputs.pass == 'true'
        env:
          # IMPORTANTE: usar COPILOT_PAT, no github.token. GitHub no triggea
          # workflows secundarios para eventos creados por GITHUB_TOKEN (anti-loop
          # protection). Con github.token el merge se hacía pero pages-deploy.yml
          # NO se disparaba. Verificado empíricamente: 5 cycles mergeados durante
          # la noche, 0 Pages rebuilds.
          GH_TOKEN: ${{ secrets.COPILOT_PAT }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # 1. Extraer issue origen ANTES del merge (con Closes #N en el body).
          PR_BODY=$(gh pr view "$PR" --repo "$REPO" --json body --jq '.body')
          ISSUE_NUM=$(echo "$PR_BODY" | grep -ioE '(closes|fixes|resolves) #[0-9]+' | head -1 | grep -oE '[0-9]+' || true)
          echo "Issue origen detectado: ${ISSUE_NUM:-<ninguno>}"

          # 2. Mergear con COPILOT_PAT → push event con autor=lezama → triggea workflows.
          gh pr merge "$PR" --repo "$REPO" --squash --delete-branch
          gh pr comment "$PR" --repo "$REPO" --body "✅ Auto-mergeado por workflow \`copilot-auto-merge\` — todas las guardrails pasaron."

          # 3. Cerrar issue origen explícitamente. El `Closes #N` en body no
          # triggea auto-close cuando el keyword se agregó via edit posterior
          # (como hace el PR finisher). Lo cerramos a mano si lo detectamos.
          if [ -n "$ISSUE_NUM" ]; then
            gh issue close "$ISSUE_NUM" --repo "$REPO" \
              --comment "Resuelto vía PR #${PR} (auto-mergeado). Reporte publicado." || \
              echo "Issue #${ISSUE_NUM} ya estaba cerrado o no existe."
          fi

      - name: Mark as needs-review (if failed)
        if: steps.gate.outputs.pass == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REASONS: ${{ steps.gate.outputs.reasons }}
        run: |
          gh pr edit "$PR" --repo "$REPO" --add-label "needs-review" --remove-label "auto-merge-candidate" || true
          gh pr comment "$PR" --repo "$REPO" --body "$(cat <<EOF
          🟡 No cumple criterios para auto-merge:

          ${REASONS}

          Ver \`.github/workflows/copilot-auto-merge.yml\` para los criterios completos. Esperando review humano.
          EOF
          )"
