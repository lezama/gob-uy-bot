name: Cron — open day cycle issue

# Cada 6 horas abre un issue asignado a @copilot para que arranque un day cycle.
# Si la asignación a @copilot no está disponible (sin Copilot subscription),
# se puede invocar manualmente vía workflow_dispatch.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      note:
        description: 'Nota opcional para incluir en el body del issue'
        required: false
        default: ''

permissions:
  issues: write
  contents: read

jobs:
  open-cycle-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute cycle metadata
        id: meta
        run: |
          # Read current cycle number from state.json
          CYCLE=$(jq -r '.cycle // 0' data/state.json)
          NEXT=$((CYCLE + 1))
          echo "next_cycle=$NEXT" >> "$GITHUB_OUTPUT"
          echo "today=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "now_iso=$(date -u +%Y-%m-%dT%H:%MZ)" >> "$GITHUB_OUTPUT"

      - name: Open day cycle issue
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_CYCLE: ${{ steps.meta.outputs.next_cycle }}
          TODAY: ${{ steps.meta.outputs.today }}
          NOW: ${{ steps.meta.outputs.now_iso }}
          NOTE: ${{ inputs.note }}
        run: |
          BODY=$(cat <<EOF
          @copilot

          Es hora del day cycle #${NEXT_CYCLE} del gob-uy-bot.

          Tu mandato vive en \`.github/copilot-instructions.md\`. Las rutinas modulares en \`data/prompts/\`. Las fuentes en \`data/sources.yml\`. El estado en \`data/state.json\`.

          ## Plan rápido

          1. Leer \`.github/copilot-instructions.md\` (entry point con reglas duras + flujo)
          2. Ejecutar \`data/prompts/01-fetch-today.md\` — actividad de hoy
          3. Ejecutar \`data/prompts/02-fetch-upcoming.md\` — agenda próxima
          4. Ejecutar \`data/prompts/03-curate.md\` — qué destacar
          5. Ejecutar \`data/prompts/04-render-day.md\` — generar \`_posts/${TODAY}-cycle-${NEXT_CYCLE}.md\`
          6. Actualizar \`data/state.json\` (cycle=${NEXT_CYCLE}, last_run, cursor++)
          7. Abrir PR con título \`[ciclo ${NEXT_CYCLE}] ${TODAY} — viz del día\`. **En el body del PR incluí \`Closes #<N>\` donde \`<N>\` es el número de ESTE issue (lo ves en la URL del browser y arriba del título)** — así GitHub cierra el issue automáticamente al mergear.
          8. Marcá el PR como ready (no draft) y agregá label \`auto-merge-candidate\` si solo tocaste \`_posts/\` y \`data/state.json\`. Sin estos 2 pasos finales el auto-merge no actúa.

          ## Notas para este ciclo

          - Trigger: ${NOW}
          ${NOTE:+- Nota: ${NOTE}}
          - Si una fuente está caída, registrala en \`state.json#failed_sources_log\` y seguí.
          - Si no hay nada relevante hoy, comiteá un reporte mínimo y avanzá el cursor.

          ---

          *Este issue lo abrió un cron job (\`.github/workflows/cron-trigger.yml\`). Se cierra automáticamente cuando el PR del ciclo (con \`Closes #<N>\` en el body) se mergea.*
          EOF
          )

          # Crear el issue. La asignación a Copilot agent requiere un fine-grained
          # PAT con permisos: Issues + PRs + Contents + Metadata + **Actions** (todos
          # read/write excepto Metadata). El PAT vive como secret COPILOT_PAT.
          # GitHub App tokens NO funcionan para esto (la asignación se factura a
          # nivel usuario, requiere user-context).
          ISSUE_URL=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "[ciclo ${NEXT_CYCLE}] day cycle ${TODAY}" \
            --body "$BODY" \
            --label "day-cycle,auto")

          echo "Issue creado: $ISSUE_URL"
          ISSUE_NUM="${ISSUE_URL##*/}"

          if [ -n "${{ secrets.COPILOT_PAT }}" ]; then
            echo "Asignando copilot-swe-agent[bot] vía REST API..."
            # REST endpoint canónico — más estable que `gh issue edit` con GraphQL
            # mutation replaceActorsForAssignable (esa requiere headers experimentales).
            # Ref: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/cloud-agent/start-copilot-sessions
            HTTP_CODE=$(curl -sS -o /tmp/assign-result.json -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ secrets.COPILOT_PAT }}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/issues/${ISSUE_NUM}/assignees" \
              -d '{"assignees":["copilot-swe-agent[bot]"]}')

            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Asignado a Copilot (HTTP $HTTP_CODE)"
            else
              echo "⚠️  Asignación falló (HTTP $HTTP_CODE):"
              cat /tmp/assign-result.json
              echo ""
              echo "Verificá que el PAT tiene Actions: Read and write — sin esa permission GitHub rechaza la asignación."
            fi
          else
            echo "ℹ️  Sin secret COPILOT_PAT — issue creado sin asignación. Agregalo en Settings → Secrets como COPILOT_PAT (fine-grained PAT con Issues + PRs + Contents + Actions read/write + Metadata read)."
          fi
