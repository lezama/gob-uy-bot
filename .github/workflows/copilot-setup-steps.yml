name: "Copilot Setup Steps"

# Corre automaticamente cuando se modifica este archivo (para validar)
# y se puede ejecutar manualmente desde Actions tab
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # El job DEBE llamarse exactamente copilot-setup-steps
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq (deberia venir por default, por las dudas)
        run: |
          jq --version || sudo apt-get install -y jq

      - name: Install htmlq (HTML parser via CSS selectors)
        run: |
          cargo install htmlq --locked
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install pup (HTML parser)
        run: |
          curl -L https://github.com/ericchiang/pup/releases/download/v0.4.0/pup_v0.4.0_linux_amd64.zip -o /tmp/pup.zip
          unzip /tmp/pup.zip -d /tmp/pup_bin
          sudo mv /tmp/pup_bin/pup /usr/local/bin/pup
          sudo chmod +x /usr/local/bin/pup

      - name: Verify tools available
        run: |
          echo "=== Verificando herramientas ==="
          curl --version | head -1
          jq --version
          gh --version
          htmlq --version || echo "htmlq ok"
          pup --version || echo "pup ok"
          echo "=== Todo listo para el agent ==="

