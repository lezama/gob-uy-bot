name: Audit — alerta si un merge tocó paths sensibles

# Corre después de cada push a main. Si el commit modificó archivos en paths
# que normalmente requieren review humano (workflows, prompts, sources,
# config, layouts), abre un issue con label `audit` para que vos te enteres.
#
# NO bloquea el merge — el merge ya pasó. Es un canario, no un guardia.
# El propósito es saber RÁPIDO si algo sensible cambió por cualquier ruta
# (PR del agent, push directo tuyo, contributor externo, etc.).

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (con history para diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detectar cambios a paths sensibles
        id: detect
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          # Si es el primer commit del branch (BEFORE = 0000...) saltamos.
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CHANGED=$(git diff --name-only "$BEFORE" "$AFTER" 2>/dev/null || git diff --name-only HEAD~1 HEAD)

          SENSITIVE=()
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in
              .github/workflows/*) SENSITIVE+=("$f (workflow)") ;;
              .github/copilot-instructions.md) SENSITIVE+=("$f (mandato del agente)") ;;
              .github/CODEOWNERS) SENSITIVE+=("$f (ownership)") ;;
              data/prompts/*) SENSITIVE+=("$f (rutina del agente)") ;;
              data/sources.yml) SENSITIVE+=("$f (watchlist)") ;;
              _config.yml) SENSITIVE+=("$f (jekyll config)") ;;
              Gemfile|Gemfile.lock) SENSITIVE+=("$f (dependencias)") ;;
            esac
          done <<< "$CHANGED"

          if [ ${#SENSITIVE[@]} -eq 0 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            { echo "files<<EOF"; printf '  - %s\n' "${SENSITIVE[@]}"; echo "EOF"; } >> "$GITHUB_OUTPUT"
          fi

      - name: Abrir issue de audit
        if: steps.detect.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          AUTHOR: ${{ github.actor }}
          MESSAGE: ${{ github.event.head_commit.message }}
          FILES: ${{ steps.detect.outputs.files }}
        run: |
          BODY=$(cat <<EOF
          ## Cambio sensible mergeado a \`main\`

          - **Commit:** [\`${SHA:0:8}\`](https://github.com/${REPO}/commit/${SHA})
          - **Autor:** ${AUTHOR}
          - **Mensaje:** ${MESSAGE}

          **Archivos sensibles modificados:**

          ${FILES}

          ### Por qué este alerta

          Estos paths normalmente requieren review humano antes de mergear. El \`copilot-auto-merge\` workflow tiene una allowlist estricta que **rechaza** estos paths para PRs de Copilot. Si llegaron a \`main\`, fue por:

          - Un PR humano (vos lo aprobaste explícitamente — no hay nada que hacer)
          - Un push directo a \`main\` con write access (revisar)
          - Un bypass del guardrail (revisar urgente)

          Si el cambio te parece OK, cerrá este issue. Si no:
          \`\`\`bash
          git revert ${SHA}
          \`\`\`
          EOF
          )

          gh issue create \
            --repo "${REPO}" \
            --title "[audit] Cambio sensible en main: ${SHA:0:8}" \
            --body "$BODY" \
            --label "audit"
