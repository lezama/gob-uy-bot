# Fuentes oficiales y de prensa que el bot consulta cada ciclo.
# Editable vía PR: agregar / corregir / cuarentenar fuentes.
#
# Convenciones:
#   enabled: true|false   — si false, el bot la skipea sin necesidad de borrarla
#   status:  ok|404|paywall|missing|quarantine
#   _note:   contexto humano sobre la fuente

_meta:
  last_human_edit: "2026-05-11"
  description: "Fuentes oficiales del gobierno uruguayo + prensa nacional política."

# ---- Presidencia ----
presidencia:
  noticias:
    url: "https://www.gub.uy/presidencia/comunicacion/noticias"
    enabled: true
    status: ok
  agenda:
    url: "https://www.gub.uy/presidencia/comunicacion/calendario-actividades"
    enabled: true
    status: ok
    _note: "Eventos próximos del Presidente — clave para sección 'qué viene'"

