# ---- Parlamento ----
parlamento:
  asuntos_entrados_senado:
    url_template: "https://parlamento.gub.uy/camarasycomisiones/senadores/transparencia/datos-abiertos/asuntos-entrados/json?Cpo_Codigo=All&Fechadesde={from}&Fechahasta={to}&_format=json"
    enabled: true
    status: ok
    explain: "JSON de todos los proyectos entrados al Parlamento (Senado + Diputados)."

  asuntos_entrados_diputados:
    url_template: "https://parlamento.gub.uy/camarasycomisiones/representantes/transparencia/datos-abiertos/asuntos-entrados/json?Cpo_Codigo=All&Fechadesde={from}&Fechahasta={to}&_format=json"
    enabled: true
    status: ok

  diario_sesiones:
    url: "https://documentos.diputados.gub.uy/docs/DAdiarioSesiones.json"
    enabled: true
    status: ok
    explain: "Cada item es un PDF de la sesión completa con votaciones nominales."

  leyes_promulgadas:
    url: "https://parlamento.gub.uy/documentosyleyes/leyes-promulgadas"
    enabled: true
    status: ok
    explain: "HTML scrape — sin endpoint JSON. Listado de leyes ya firmadas por el Presidente."

  noticias_senado:
    url: "https://parlamento.gub.uy/camarasycomisiones/senadores/noticias"
    enabled: true
    status: ok

  noticias_diputados:
    url: "https://parlamento.gub.uy/camarasycomisiones/representantes/noticias"
    enabled: true
    status: ok

# ---- Prensa nacional ----
press:
  ladiaria:
    name: "La Diaria"
    url: "https://ladiaria.com.uy/politica/"
    enabled: true
    status: ok
    paywall: true
    _note: "Paywall pero los titulares y dechecks son visibles sin suscripción."

  busqueda:
    name: "Búsqueda"
    url: "https://www.busqueda.com.uy/politica"
    enabled: true
    status: ok
    paywall: true

  subrayado:
    name: "Subrayado"
    url: "https://www.subrayado.com.uy/politica"
    enabled: true
    status: ok
    paywall: false
    _note: "Sin fechas individuales por artículo — frágil para windowing."

  elobservador:
    name: "El Observador"
    url: "https://www.elobservador.com.uy/nacional"
    enabled: true
    status: ok
    _note: "URL anterior /seccion/politica dio 404 a partir del 2026-05-11. El medio reestructuró URLs: la sección de actualidad doméstica ahora vive en /nacional — el <title> dice literal 'Noticias de política de Uruguay - El Observador'. Verificado con curl. Requiere elobservador.com.uy en el allowlist del Copilot agent."

  montevideo_portal:
    name: "Montevideo Portal"
    url: "https://montevideo.com.uy/Noticias/Politica"
    enabled: true
    status: ok
    _note: "URL apex (sin www) para matchear el rule exacto `montevideo.com.uy` del allowlist del Copilot agent. Ambas variantes www/apex resuelven al mismo contenido — verificado curl + Playwright. Si vuelve a fallar, primero verificar el allowlist."

