# ---- Glosario base — términos que el bot debe explicar inline ----
# Si el bot detecta uno de estos términos en un titular destacado, agrega
# `context_glossary` al render. Editable vía PR.
glossary:
  - term: "Rendición de Cuentas"
    explain: "Ley anual que ajusta el presupuesto en función de cómo va ejecutándose."
  - term: "Media hora previa"
    explain: "Espacio al inicio de cada sesión parlamentaria donde legisladores hablan sobre temas libres."
  - term: "ASSE"
    explain: "Administración de Servicios de Salud del Estado — la red pública de salud."
  - term: "BPS"
    explain: "Banco de Previsión Social — administra jubilaciones, pensiones, asignaciones familiares."
  - term: "ANEP"
    explain: "Administración Nacional de Educación Pública — primaria, media y técnica."
  - term: "UTE"
    explain: "Administración Nacional de Usinas y Trasmisiones Eléctricas — la empresa estatal de electricidad."
  - term: "ANCAP"
    explain: "Administración Nacional de Combustibles, Alcohol y Pórtland — la empresa estatal de energía/petróleo."
  - term: "OSE"
    explain: "Obras Sanitarias del Estado — la empresa estatal de agua y saneamiento."
  - term: "Mercosur"
    explain: "Bloque económico regional con Argentina, Brasil, Paraguay, Uruguay (y Bolivia en proceso)."
  - term: "FA"
    explain: "Frente Amplio — coalición de partidos de izquierda y centroizquierda. Actualmente en el gobierno."
  - term: "PN"
    explain: "Partido Nacional — partido tradicional, centroderecha. En oposición."
  - term: "PC"
    explain: "Partido Colorado — partido tradicional, centroderecha. En oposición."
  - term: "Cabildo Abierto"
    explain: "Partido fundado en 2019 con base en miembros retirados de las Fuerzas Armadas. En oposición."
  - term: "MPP"
    explain: "Movimiento de Participación Popular — sector más grande dentro del Frente Amplio."
